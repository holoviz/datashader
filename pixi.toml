[workspace]
name = "datashader"
channels = ["pyviz/label/dev", "conda-forge"]
platforms = ["linux-64", "osx-arm64", "win-64"]

[environments]
default = [
    "required",
    "py313",
    "optional",
    "test-core",
    "test-example",
    "test-unit-task",
    "lint",
    "dev",
]

[environments.test-310]
features = ["required", "py310", "optional", "test-core", "test-example", "test-unit-task"]
no-default-feature = true

[environments.test-311]
features = ["required", "py311", "optional", "test-core", "test-example", "test-unit-task"]
no-default-feature = true

[environments.test-312]
features = ["required", "py312", "optional", "test-core", "test-example", "test-unit-task"]
no-default-feature = true

[environments.test-313]
features = ["required", "py313", "optional", "test-core", "test-example", "test-unit-task"]
no-default-feature = true

[environments.test-314]
features = ["required", "py314", "optional", "test-core", "test-example", "test-unit-task"]
no-default-feature = true

[environments.test-core]
features = ["required", "py314", "test-core", "test-unit-task"]
no-default-feature = true

[environments.test-gpu]
features = ["required", "py313", "test-core", "test-gpu"]
no-default-feature = true

[environments.docs]
features = ["required", "py311", "optional", "doc"]
no-default-feature = true

[environments.build]
features = ["required", "py311", "build"]
no-default-feature = true

[environments.lint]
features = ["lint"]
no-default-feature = true

[feature.required.dependencies]
nomkl = "*"
pip = "*"
# Required
numba = "*"
llvmlite = "*"
colorcet = "*"
multipledispatch = "*"
numpy = "*"
pandas = "*"
param = "*"
pyct = "*"
requests = "*"
scipy = "*"
setuptools = "*" # distutils for pyct
toolz = "*"
xarray = "*"

[feature.required.tasks]
download-data = "python scripts/download_data.py"
install = "python -m pip install --no-deps --disable-pip-version-check -e ."

[feature.required.activation.env]
PYTHONIOENCODING = "utf-8"

[feature.py310.dependencies]
python = "3.10.*"

[feature.py311.dependencies]
python = "3.11.*"

[feature.py312.dependencies]
python = "3.12.*"

[feature.py312.activation.env]
COVERAGE_CORE = "sysmon"

[feature.py313.dependencies]
python = "3.13.*"

[feature.py313.activation.env]
COVERAGE_CORE = "sysmon"

[feature.py314.dependencies]
python = "3.14.*"
python-gil = "*"

[feature.py314.activation.env]
COVERAGE_CORE = "sysmon"

[feature.optional.dependencies]
bokeh = ">3.1"
bokeh_sampledata = "*"
dask-core = "*"
dask-geopandas = "*"
fastparquet = "*"
fiona = "*"
geodatasets = "*"
geopandas-base = "*"
graphviz = "*"
holoviews = "*"
hvsampledata = ">=0.1.5a3"
matplotlib-base = ">=3.3"
netcdf4 = "*"
networkx = "*"
panel = ">1.1"
pillow = "*"
pyarrow = "*"
pyproj = "*"
python-graphviz = "*"
python-snappy = "*"
rasterio = "*"
rioxarray = "*"
scikit-image = "*"
shapely = ">=2.0.0"
spatialpandas = "*"

[feature.dev.dependencies]
jupyterlab = "*"
jupyterlab-myst = "*"
setuptools_scm = "*"

[feature.dev.tasks]
lab = 'jupyter lab'
setup-dev = { depends-on = ["install", "download-data", "lint-install"] }

# =============================================
# =================== TESTS ===================
# =============================================
[feature.test-core.dependencies]
hypothesis = "*"
psutil = "*"
pytest = "*"
pytest-codspeed = "*"
pytest-cov = "*"
pytest-github-actions-annotate-failures = "*"
pytest-xdist = "*"

[feature.test-unit-task.tasks] # So it is not showing up in the test-gpu environment
test-unit = 'pytest datashader -n logical --dist loadgroup'
test-unit-nojit = { cmd = 'pytest datashader -k "not test_tiles" -n logical --dist loadgroup', env = { NUMBA_DISABLE_JIT = '1' } }
test-benchmark = { cmd = 'pytest datashader/tests --benchmark --codspeed', env = { DASK_SCHEDULER = "single-threaded" } }

[feature.test-example.dependencies]
nbval = "*"

[feature.test-example.tasks]
test-example = 'pytest -n logical --dist loadscope --nbval-lax examples'

[feature.test-gpu]
channels = ["rapidsai"]
platforms = ["linux-64"]

[feature.test-gpu.activation.env]
NUMBA_CUDA_LOW_OCCUPANCY_WARNINGS = '0'

[feature.test-gpu.dependencies]
cuda-version = "13.1.*"
cudf = "26.04.*"
cupy = "*"
dask-cudf = "*"
librmm = { version = "*", channel = "rapidsai" }
rmm = { version = "*", channel = "rapidsai" }

[feature.test-gpu.tasks]
test-gpu = "python -m pytest datashader/tests -n logical --dist loadgroup --gpu"
test-benchmark = { cmd = 'pytest datashader/tests --gpu --benchmark --codspeed', env = { DASK_SCHEDULER = "single-threaded" } }

# =============================================
# =================== DOCS ====================
# =============================================
[feature.doc.dependencies]
nbsite = ">=0.9.0a2, <0.10.0a0"
numpydoc = "*"
sphinxcontrib-mermaid = "*"
sphinx-reredirects = "*"

[feature.doc.tasks]
_docs-generate-rst = 'nbsite generate-rst --org holoviz --project-name datashader'
_docs-generate = 'nbsite build --what=html --output=builtdocs --org holoviz --project-name datashader'
_docs-install = 'python -m pip install --no-deps --disable-pip-version-check -e .'

[feature.doc.tasks.docs-build]
depends-on = ['_docs-generate-rst', '_docs-generate']

[feature.doc.tasks.docs-build-full]
depends-on = ['_docs-install', 'download-data', '_docs-generate-rst', '_docs-generate']

[feature.doc.activation.env]
HV_DOCS_BUILD = "1"

# =============================================
# ================== BUILD ====================
# =============================================
[feature.build.dependencies]
python-build = "*"
conda-build = "*"

[feature.build.tasks]
build-conda = 'bash scripts/conda/build.sh'
build-pip = 'python -m build .'

[feature.build.activation.env]
MPLBACKEND = "Agg"

# =============================================
# =================== LINT ====================
# =============================================
[feature.lint.dependencies]
pre-commit = "*"

[feature.lint.tasks]
lint = 'pre-commit run --all-files'
lint-install = 'pre-commit install'
